<div class="login-container">
  <div class="login-card">
    <h1>LabHub</h1>
    <p class="subtitle">Lab Inventory System</p>
    <form (ngSubmit)="login()">
      <div class="form-group">
        <p-floatlabel>
          <label for="username">Username</label>
          <input
            pInputText
            [(ngModel)]="username"
            name="username"
            autocomplete="off"
            id="username"
          />
        </p-floatlabel>
      </div>
      <div class="form-group">
        <p-floatlabel>
          <label for="password">Password</label>
          <input
            pInputText
            [(ngModel)]="password"
            name="password"
            autocomplete="off"
            id="password"
            type="password"
          />
        </p-floatlabel>
      </div>

      @if (errorMessage()) {
        <p class="error">{{ errorMessage() }}</p>
      }

      <p-button
        type="submit"
        label="Login"
        styleClass="w-full"
        [loading]="loading()"
      ></p-button>
    </form>
  </div>
</div>
